# XcodeGen spec for iosApp
# Regenerate the .xcodeproj with:
#   brew install xcodegen
#   cd iosApp && xcodegen generate
#
# The Shared.framework consumed by iosApp comes from the KMP shared module:
#   ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
#   ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
#
# Both framework outputs land under shared/build/... and composeApp/build/...
# xcodegen wires those paths as `frameworkSearchPaths` below.

name: iosApp
options:
  bundleIdPrefix: com.uvp.sim
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
      # v1.3-C: SceneKit .scn 资源目录(手动转换,详见 Resources/README.md)。
      # `optional: true` 让 Resources 缺失时不阻塞 xcodegen(占位期 .scn 未落地)。
      - path: iosApp/Resources
        type: folder
        optional: true
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: UVP Sim
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Permissions per plan §3.4
        NSCameraUsageDescription: "UVP Sim needs camera access to simulate a GB28181 device video stream."
        NSMicrophoneUsageDescription: "UVP Sim needs microphone access to simulate a GB28181 device audio stream."
        # Compose Multiplatform iOS runtime sanity check (F4 fix). Enables
        # high-refresh-rate rendering on ProMotion iPhones. Docs:
        # https://developer.apple.com/documentation/quartzcore/optimizing_promotion_refresh_rates_for_iphone_13_pro_and_ipad_pro
        CADisableMinimumFrameDurationOnPhone: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uvp.sim.ios
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for v1.1 (spec §5)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: '"iosApp/Preview Content"'
        # 真机装机(v1.1 T15):Automatic 签名,Xcode 打开后手动选 Personal Team。
        # Personal Team provisioning profile 7 天有效,过期插 USB ⌘R 重装即可。
        CODE_SIGN_STYLE: Automatic
        # 老板个人 Personal Team ID(security find-identity 输出括号内那串)。
        # xcodegen 每次重生成 pbxproj 都会用这个值,不再被历史遗留的 WQP89BUR2M 覆盖。
        # 开源发版前需替换 / 删除此行(每人用自己 team)。
        DEVELOPMENT_TEAM: CD3WR5D4U8
        # KMP-produced framework path. Only ComposeApp.framework — it
        # re-exports :shared so we don't init the Kotlin runtime twice
        # (F3 fix, see overnight report).
        # 真机 iosArm64 / Simulator iosSimulatorArm64。用 SDK 条件把两条路径分开,
        # 否则同时列两条 linker 会挑到错的架构报 "Building for 'iOS', but linking
        # in object file built for 'iOS-simulator'"。
        "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]":
          - "$(inherited)"
          - "$(PROJECT_DIR)/../composeApp/build/bin/iosArm64/debugFramework"
        "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]":
          - "$(inherited)"
          - "$(PROJECT_DIR)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
    preBuildScripts:
      - name: "Build KMP Frameworks"
        script: |
          export JAVA_HOME=/opt/homebrew/opt/openjdk@17
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          # PLATFORM_NAME=iphoneos(真机)/ iphonesimulator(模拟器)
          if [ "$PLATFORM_NAME" = "iphoneos" ]; then
            KMP_TARGET="IosArm64"
          else
            KMP_TARGET="IosSimulatorArm64"
          fi
          if [ "$CONFIGURATION" = "Release" ]; then
            ./gradlew :composeApp:linkReleaseFramework${KMP_TARGET}
          else
            ./gradlew :composeApp:linkDebugFramework${KMP_TARGET}
          fi
        basedOnDependencyAnalysis: false
