<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PTZ Camera Preview</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1017;
        --panel: rgba(11, 16, 23, 0.78);
        --line: rgba(255, 255, 255, 0.12);
        --text: #e8eef6;
        --muted: #9ca9bb;
        --accent: #8fd2ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top, #172233 0%, #0b1017 56%, #070a10 100%);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .toolbar {
        position: fixed;
        left: 16px;
        top: 16px;
        width: min(420px, calc(100vw - 32px));
        display: grid;
        gap: 10px;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        backdrop-filter: blur(14px);
      }

      .toolbar header {
        display: grid;
        gap: 4px;
      }

      .toolbar h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.25;
      }

      .toolbar p {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      .control {
        display: grid;
        grid-template-columns: 52px 1fr 60px;
        gap: 10px;
        align-items: center;
      }

      .control label,
      .control output {
        font-size: 12px;
        color: var(--muted);
      }

      .control output {
        text-align: right;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      input[type='range'] {
        width: 100%;
        margin: 0;
        accent-color: var(--accent);
      }

      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .toggle-row span {
        font-size: 12px;
        color: var(--muted);
      }

      .toggle-row input {
        width: 18px;
        height: 18px;
        margin: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
      }

      .badge::before {
        content: '';
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--accent);
      }

      .status {
        position: fixed;
        right: 16px;
        bottom: 16px;
        padding: 10px 12px;
        background: rgba(8, 11, 16, 0.66);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 11px;
        color: var(--muted);
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body>
    <aside class="toolbar">
      <header>
        <h1>Generated PTZ Camera</h1>
        <p>独立预览，不替换现有资产。节点已按云台控制分层。</p>
      </header>

      <div class="control">
        <label for="yaw">Yaw</label>
        <input id="yaw" type="range" min="-180" max="180" step="1" value="22" />
        <output id="yawValue">22deg</output>
      </div>

      <div class="control">
        <label for="pitch">Pitch</label>
        <input id="pitch" type="range" min="-70" max="50" step="1" value="-10" />
        <output id="pitchValue">-10deg</output>
      </div>

      <div class="control">
        <label for="zoom">Zoom</label>
        <input id="zoom" type="range" min="1" max="16" step="0.1" value="4" />
        <output id="zoomValue">4.0x</output>
      </div>

      <div class="toggle-row">
        <span class="badge">PTZ_Yaw_Pivot / PTZ_Pitch_Pivot / PTZ_Zoom_Sled</span>
        <label>
          <input id="autoDemo" type="checkbox" checked />
        </label>
      </div>
    </aside>

    <div class="status" id="status">Loading model...</div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/controls/OrbitControls.js';
      import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/loaders/GLTFLoader.js';

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0b1017, 10, 24);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;
      document.body.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(3.2, 2.4, 4.6);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.1, 0);
      controls.minDistance = 2.2;
      controls.maxDistance = 9.5;
      controls.maxPolarAngle = Math.PI * 0.48;

      scene.add(new THREE.HemisphereLight(0xe6f4ff, 0x1a202b, 1.65));

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
      keyLight.position.set(5, 7, 5);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0x90c8ff, 1.2);
      rimLight.position.set(-5, 3, -4);
      scene.add(rimLight);

      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(4.8, 72),
        new THREE.MeshStandardMaterial({
          color: 0x111926,
          roughness: 0.95,
          metalness: 0.0,
        })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -1.17;
      scene.add(ground);

      const grid = new THREE.GridHelper(10, 20, 0x294258, 0x1b2c3d);
      grid.position.y = -1.16;
      grid.material.opacity = 0.35;
      grid.material.transparent = true;
      scene.add(grid);

      const loader = new GLTFLoader();
      const statusEl = document.getElementById('status');
      const yawSlider = document.getElementById('yaw');
      const pitchSlider = document.getElementById('pitch');
      const zoomSlider = document.getElementById('zoom');
      const yawValue = document.getElementById('yawValue');
      const pitchValue = document.getElementById('pitchValue');
      const zoomValue = document.getElementById('zoomValue');
      const autoDemo = document.getElementById('autoDemo');

      let yawPivot;
      let pitchPivot;
      let zoomSled;
      let cameraRoot;
      let demoClock = 0;

      if (window.location.protocol === 'file:') {
        statusEl.textContent = 'Please open via http://127.0.0.1:8765/preview/ptz-camera/index.html';
        throw new Error('This preview must be opened over http, not file://');
      }

      function updateLabels() {
        yawValue.textContent = `${Number(yawSlider.value).toFixed(0)}deg`;
        pitchValue.textContent = `${Number(pitchSlider.value).toFixed(0)}deg`;
        zoomValue.textContent = `${Number(zoomSlider.value).toFixed(1)}x`;
      }

      function applyPose() {
        if (!yawPivot || !pitchPivot || !zoomSled) return;

        const yawDeg = Number(yawSlider.value);
        const pitchDeg = Number(pitchSlider.value);
        const zoom = Number(zoomSlider.value);
        const zoomT = THREE.MathUtils.clamp((zoom - 1) / 15, 0, 1);

        yawPivot.rotation.y = THREE.MathUtils.degToRad(yawDeg);
        pitchPivot.rotation.x = THREE.MathUtils.degToRad(pitchDeg);
        zoomSled.position.z = 0.58 + zoomT * 0.48;

        camera.position.set(
          THREE.MathUtils.lerp(3.2, 2.0, zoomT),
          THREE.MathUtils.lerp(2.4, 1.62, zoomT),
          THREE.MathUtils.lerp(4.6, 2.55, zoomT)
        );
        camera.fov = THREE.MathUtils.lerp(34, 24, zoomT);
        camera.updateProjectionMatrix();
        controls.update();
        updateLabels();
      }

      [yawSlider, pitchSlider, zoomSlider].forEach((input) => {
        input.addEventListener('input', () => {
          autoDemo.checked = false;
          applyPose();
        });
      });

      loader.load(
        '../../composeApp/src/androidMain/assets/generated_ptz_camera.glb',
        (gltf) => {
          cameraRoot = gltf.scene;
          scene.add(cameraRoot);
          yawPivot = cameraRoot.getObjectByName('PTZ_Yaw_Pivot');
          pitchPivot = cameraRoot.getObjectByName('PTZ_Pitch_Pivot');
          zoomSled = cameraRoot.getObjectByName('PTZ_Zoom_Sled');

          cameraRoot.traverse((node) => {
            if (node.isMesh) {
              node.castShadow = false;
              node.receiveShadow = false;
            }
          });

          applyPose();
          statusEl.textContent = 'Model loaded';
        },
        undefined,
        (error) => {
          console.error(error);
          statusEl.textContent = 'Model load failed';
        }
      );

      updateLabels();

      function animate() {
        requestAnimationFrame(animate);
        if (autoDemo.checked && yawPivot && pitchPivot && zoomSled) {
          demoClock += 0.012;
          yawSlider.value = (Math.sin(demoClock * 0.7) * 65).toFixed(1);
          pitchSlider.value = (-10 + Math.sin(demoClock * 1.15) * 18).toFixed(1);
          zoomSlider.value = (4 + (Math.sin(demoClock * 0.48) + 1) * 3.1).toFixed(1);
          applyPose();
        }
        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
