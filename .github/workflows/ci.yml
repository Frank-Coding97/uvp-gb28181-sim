name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8"
  JAVA_TOOL_OPTIONS: "-Xmx5g"

jobs:
  build-test:
    name: Build & Test (ubuntu / jdk17)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17 (temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with wrapper validation)
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Cache Konan (KMP iOS prebuilt)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.2.21-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-kotlin-2.2.21-
            konan-${{ runner.os }}-

      - name: Compile shared metadata (KMP fast-fail)
        run: ./gradlew :shared:compileKotlinMetadata --stacktrace

      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest --stacktrace

      - name: Run androidApp Debug unit tests
        run: ./gradlew :androidApp:testDebugUnitTest --stacktrace

      - name: Build androidApp Debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
            **/build/outputs/logs/**
          retention-days: 7
          if-no-files-found: ignore

  ios-check:
    name: iOS Compile Check (macos / jdk17)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17 (temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with wrapper validation)
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Cache Konan (KMP iOS prebuilt)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-macos-kotlin-2.2.21-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-macos-kotlin-2.2.21-
            konan-macos-

      - name: Compile shared iosArm64
        run: ./gradlew :shared:compileKotlinIosArm64 --stacktrace

      - name: Compile shared iosSimulatorArm64
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 --stacktrace

      # cross-review R2 #2:composeApp/iosMain 有大量 UI + Filament + 桥接代码,
      # 只编 shared 会漏掉 composeApp iosMain 的 Kotlin 编译错误。加两个 target 的
      # compile 门禁,把 iosMain 层守住。iosApp/Swift 完整 xcodebuild 太重,留在
      # 发版前手动跑 xcodegen + Xcode ⌘R 验证。
      - name: Compile composeApp iosArm64
        run: ./gradlew :composeApp:compileKotlinIosArm64 --stacktrace

      - name: Compile composeApp iosSimulatorArm64
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 --stacktrace

      # ComposeApp.framework linking:验 KMP → framework 的 export/hidden symbol
      # 组装能过。若 iosApp 侧 link 失败通常在这一步暴露(export 缺项 / 符号丢失)。
      - name: Assemble composeApp iOS framework (simulator)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      - name: Run shared iosSimulatorArm64 tests
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace

      - name: Upload iOS test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
            **/build/outputs/logs/**
          retention-days: 7
          if-no-files-found: ignore
